<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="Constella — a cosmic control plane for autonomous AI agent-companies">
  <defs>
    <radialGradient id="space" cx="50%" cy="38%" r="85%">
      <stop offset="0%" stop-color="#1b1140"/>
      <stop offset="45%" stop-color="#0d0a26"/>
      <stop offset="100%" stop-color="#050416"/>
    </radialGradient>
    <linearGradient id="title" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="520" y2="0" spreadMethod="reflect">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.25" stop-color="#60a5fa"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="0.75" stop-color="#e879f9"/>
      <stop offset="1" stop-color="#a78bfa"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-520 0" to="520 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="orbitline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#space)"/>

  <!-- starfield -->
  <g fill="#ffffff" filter="url(#soft)">
    <circle cx="80" cy="60" r="1.4" opacity="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="120" r="1" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="40" r="1.2" opacity="0.7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="200" r="1" opacity="0.6"/>
    <circle cx="120" cy="240" r="1.6" opacity="0.9"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="80" r="1" opacity="0.5"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="280" r="1.3" opacity="0.7"/>
    <circle cx="700" cy="50" r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.2;0.85;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="780" cy="150" r="1" opacity="0.5"/>
    <circle cx="860" cy="60" r="1.5" opacity="0.85"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="940" cy="220" r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="100" r="1.3" opacity="0.7"/>
    <circle cx="1100" cy="180" r="1" opacity="0.5"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="70" r="1.5" opacity="0.85"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="120" r="1" opacity="0.5"/>
    <circle cx="40" cy="160" r="1.1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="40" r="1" opacity="0.5"/>
    <circle cx="300" cy="290" r="1.2" opacity="0.7"><animate attributeName="opacity" values="0.3;0.95;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
  </g>

  <!-- orbit with travelling planet -->
  <g transform="translate(600 250)">
    <ellipse rx="430" ry="56" fill="none" stroke="url(#orbitline)" stroke-width="1.5" opacity="0.7"/>
    <circle r="5" fill="#22d3ee" filter="url(#glow)">
      <animateMotion dur="14s" repeatCount="indefinite" path="M 430 0 A 430 56 0 1 1 -430 0 A 430 56 0 1 1 430 0"/>
    </circle>
    <circle r="3" fill="#e879f9" filter="url(#glow)">
      <animateMotion dur="14s" begin="-7s" repeatCount="indefinite" path="M 430 0 A 430 56 0 1 1 -430 0 A 430 56 0 1 1 430 0"/>
    </circle>
  </g>

  <!-- wordmark -->
  <g text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif">
    <text x="600" y="150" font-size="92" font-weight="800" letter-spacing="2" fill="url(#title)" filter="url(#glow)">Constella</text>
    <text x="600" y="150" font-size="92" font-weight="800" letter-spacing="2" fill="url(#title)" opacity="0.9">Constella</text>
    <text x="600" y="196" font-size="21" fill="#cbd5e1" letter-spacing="3" font-weight="500">✦ ⋆ ｡˚  A COSMIC CONTROL PLANE FOR AUTONOMOUS AI AGENT-COMPANIES  ˚｡ ⋆ ✦</text>
    <text x="600" y="226" font-size="15" fill="#64748b" letter-spacing="1">Real claude / codex agents that plan, build, review and ship — your machine, your models, your rules.</text>
  </g>
</svg>
